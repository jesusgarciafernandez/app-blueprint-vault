<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="App Blueprint Vault">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#1a1040"/>
      <stop offset="1" stop-color="#2a1a5e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- rejilla blueprint sutil -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="48" y1="0" x2="48" y2="400"/><line x1="96" y1="0" x2="96" y2="400"/><line x1="144" y1="0" x2="144" y2="400"/><line x1="192" y1="0" x2="192" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/><line x1="288" y1="0" x2="288" y2="400"/><line x1="336" y1="0" x2="336" y2="400"/><line x1="384" y1="0" x2="384" y2="400"/><line x1="432" y1="0" x2="432" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="528" y1="0" x2="528" y2="400"/><line x1="576" y1="0" x2="576" y2="400"/><line x1="624" y1="0" x2="624" y2="400"/><line x1="672" y1="0" x2="672" y2="400"/><line x1="720" y1="0" x2="720" y2="400"/><line x1="768" y1="0" x2="768" y2="400"/><line x1="816" y1="0" x2="816" y2="400"/><line x1="864" y1="0" x2="864" y2="400"/><line x1="912" y1="0" x2="912" y2="400"/><line x1="960" y1="0" x2="960" y2="400"/><line x1="1008" y1="0" x2="1008" y2="400"/><line x1="1056" y1="0" x2="1056" y2="400"/><line x1="1104" y1="0" x2="1104" y2="400"/><line x1="1152" y1="0" x2="1152" y2="400"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="48" x2="1200" y2="48"/><line x1="0" y1="96" x2="1200" y2="96"/><line x1="0" y1="144" x2="1200" y2="144"/><line x1="0" y1="192" x2="1200" y2="192"/><line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="288" x2="1200" y2="288"/><line x1="0" y1="336" x2="1200" y2="336"/><line x1="0" y1="384" x2="1200" y2="384"/>
  </g>
  <!-- estrellas -->
  <g fill="#ffffff" fill-opacity="0.7">
    <circle cx="980" cy="70" r="2"/><circle cx="1080" cy="130" r="1.5"/><circle cx="900" cy="150" r="1.5"/>
    <circle cx="1130" cy="60" r="2"/><circle cx="1040" cy="200" r="1.5"/><circle cx="860" cy="90" r="1"/>
  </g>

  <!-- emblema: nave/cohete estilizado -->
  <g transform="translate(150 200)" filter="url(#glow)">
    <circle r="92" fill="none" stroke="url(#accent)" stroke-width="3" stroke-opacity="0.6"/>
    <circle r="64" fill="none" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.4"/>
    <path d="M0 -58 C 26 -22, 26 26, 0 60 C -26 26, -26 -22, 0 -58 Z" fill="url(#accent)"/>
    <circle cy="-14" r="12" fill="#0b1020"/>
    <path d="M0 60 L -16 86 L 0 74 L 16 86 Z" fill="#a855f7"/>
  </g>

  <!-- texto -->
  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
    <text x="290" y="150" fill="#ffffff" font-size="74" font-weight="800" letter-spacing="-1">App Blueprint Vault</text>
    <text x="293" y="196" fill="#c7d2fe" font-size="27" font-weight="500">590+ skills profesionales para tu IA de código</text>
    <text x="293" y="228" fill="#94a3b8" font-size="19">Claude · Cursor · Codex · Windsurf — instala el conocimiento, no lo pegues</text>

    <!-- chips -->
    <g font-size="20" font-weight="700">
      <rect x="293" y="258" width="150" height="44" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="url(#accent)" stroke-opacity="0.5"/>
      <text x="368" y="286" fill="#e0f2fe" text-anchor="middle">24 packs</text>
      <rect x="455" y="258" width="160" height="44" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="url(#accent)" stroke-opacity="0.5"/>
      <text x="535" y="286" fill="#e0f2fe" text-anchor="middle">590+ skills</text>
      <rect x="627" y="258" width="210" height="44" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="url(#accent)" stroke-opacity="0.5"/>
      <text x="732" y="286" fill="#e0f2fe" text-anchor="middle">Offline · Zero-deps</text>
    </g>

    <text x="293" y="346" fill="#64748b" font-size="17">Human-Centric AI · Jesús García Fernández · jesusgarciafernandez.com</text>
  </g>
</svg>
